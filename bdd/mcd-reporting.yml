Table site {
  site_name string
  site_adress string 
}

Table location {
  location_name string
  location_adress string
}

Table google_search_keywords {
  site_name string
  location_name string
  date date
  earchKeyword string
  impression_value integer
}

Ref: google_search_keywords.location_name > location.location_name
Ref: google_search_keywords.site_name > site.site_name

