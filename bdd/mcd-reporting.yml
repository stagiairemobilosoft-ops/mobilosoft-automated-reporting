  BUSINESS_IMPRESSIONS_MOBILE_MAPS integer
  BUSINESS_IMPRESSIONS_MOBILE_SEARCH integer
  BUSINESS_CONVERSATIONS integer
  BUSINESS_DIRECTION_REQUESTS integer
  CALL_CLICKS integer
  WEBSITE_CLICKS integer
  BUSINESS_BOOKINGS integer
  BUSINESS_FOOD_ORDERS integer
  BUSINESS_FOOD_MENU_CLICKS integer
}

Ref: google_daily_metrics_partitioned.location_name > location.location_name
Ref: google_daily_metrics_partitioned.site_name > site.site_name

